<!DOCTYPE html>
<html lang="ko" dir="ltr">
  <head>
    <meta charset="utf-8">
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
      }

      h1 {text-align: center;}

      .column {
        float: left;
        width: 33.33%;
        padding: 5px;
      }

      .row::after {
        content: "";
        clear: both;
        display: table;
      }

      img {
        border-radius: 50%;
      }

      #couponField {
        background-color: #FF0;
        padding: 1rem;
        list-style-type: none;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        grid-gap: 1rem;
        width: calc(80vw + 6rem);
        height: calc(32vw + 3rem);
      }

      .stamp {
        border-radius: 16vw;
      }
      .stamp.empty {
        background-color: #FFF;
      }
      .stamp.filled {
        background-color: #F00;
      }
      .stamp.joy-gift {
        background-image: url('joy_gift.png');
        background-size: cover;
      }
      .stamp.special-gift {
        background-image: url('special_gift.png');
        background-size: cover;
      }
      .notice{
        text-align: right;
      }

    </style>
    <title>으악</title>
  </head>
  <body>
    <h1>올리브영 천안나사렛점</h1>
    <form id="stampForm">
      <label for="stampNum">도장의 개수를 입력해주세요:</label>
      <input type="text" id='stampNum' class='stampNum' autocomplete="off">
      <input type="submit" value="도장 찍기" class='giveStamp'>
      <input type="submit" value="쿠폰 사용하기" class='clearStamps'>
    </form>
    <ol id='couponField'>
    </ol>
    <p class='notice'>실결제 금액 1만원 당 도장 1개씩 GET!</p>
    <ol id='dateField'>
    </ol>

    <script>
    // {
    //   stamps: [
    //     {ts, n},
    //     {ts, n},
    //   ],
    //   usages: [
    //     {ts, n},
    //     {ts, n},
    //   ],
    // }
      const MAX_STAMPS = 10;

      function main() {
        document.querySelector('.giveStamp').addEventListener('click', giveStamp);
        document.querySelector('.clearStamps').addEventListener('click', clearStamps)

        // 기존 도장 수를 불러온다.
        const stamps = loadStamps();
        // 화면에 도장을 새로 그린다.
        updateHTML(stamps);
      }

      function giveStamp(e) {
        e.preventDefault();
        // 새 도장 개수를 얻어온다.
        const newStamps = getNewStamps();
        // 기존 도장 수를 불러온다.
        const curStamps = loadStamps();
        // 도장을 추가한다.
        const mergedStamps = [...curStamps, newStamps];
        // 저장한다.
        saveStamps(mergedStamps);
        // 화면에 도장을 새로 그린다.
        updateHTML(mergedStamps);
        // 기존에 입력된 값을 지운다.
        document.querySelector('#stampNum').value = '';
      }

      function clearStamps() {
        localStorage.clear()
        location.reload();
      }

      function loadStamps() {
        return JSON.parse(localStorage.stamps || '[]');
      }

      function saveStamps(stamps) {
        localStorage.stamps = JSON.stringify(stamps);
      }

      function reset() {
        saveStamps([]);
        updateHTML([]);
      }

      function getNewStamps() {
        const n = +document.querySelector('#stampNum').value;
        const now = +new Date();
        return {ts: now, n: n};
      }

      function updateHTML(stamps) {
        drawStamps(stamps);
        drawDates(stamps);
      }

      function drawStamps(stamps) {
        // 10개의 빈 동그라미 5*2
        // 도장 수만큼의 빨간 동그라미
        let sumStamps = 0;
        for(let i = 0; i < stamps.length; i++) {
          sumStamps += stamps[i].n;
        }

        const html = [];
        for(let i = 0; i < MAX_STAMPS; i++) {
          if(i < sumStamps) {
            if(i === 4) {
              html.push('<li class="stamp joy-gift"></li>');
            } else {
              html.push('<li class="stamp filled"></li>');
              if(i === 8) {
                html.push('<li class="stamp special-gift"></li>');
                console.log('ha')
              }
            }
          } else {
            html.push('<li class="stamp empty"></li>');
          }
        }
        document.querySelector('#couponField').innerHTML = html.join('');
      }

      function drawDates(stamps) {
        // let visitingDate = [];
        // for (let i = 0; i < stamps.length; i++) {
        //   const s = stamps[i];
        //   visitingDate.push();
        // }
        const html = stamps
          .map((s, i) => (
            '<li>' +
            `${formatDaysAgo(s.ts)} ` +
            `${s.n}개 (${formatDate(s.ts)}) ` +
            `<a href="#" class="cancel" data-id="${i}">취소</a>` +
            '</li>'
          ))
          .join('\n');
        document.querySelector('#dateField').innerHTML = html;

        const cancelLinks = document.querySelectorAll('.cancel');
        for(let i = 0; i< cancelLinks.length; i++) {
          cancelLinks[i].addEventListener('click', e => {
            e.preventDefault();
            cancelStamps(+e.target.dataset.id);
          });
        }
      }

      function cancelStamps(index) {
        let stamps = loadStamps();
        stamps.splice(index, 1);
        saveStamps(stamps);
        updateHTML(stamps);
      }

      function formatDate(ts) {
        const date = new Date(ts);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const dayOfMonth = String(date.getDate()).padStart(2, '0');
        const day = '일월화수목금토'.charAt(date.getDay());
        const hour = String(date.getHours()).padStart(2, '0');
        const mins = String(date.getMinutes()).padStart(2, '0');
        return year + '년 ' + month + '월 ' + dayOfMonth + '일 ' + day + '요일 ' + hour + '시 ' + mins + '분';
      }

      function formatDaysAgo(ts) {
        const now = +new Date();
        const delta = now - ts;
        const days = Math.floor(delta / 1000 / 60 / 60 / 24);
        const daysAgo = days === 0 ? '오늘' : days + '일 전';
        return daysAgo;
      }

      main();
    </script>
  </body>
</html>

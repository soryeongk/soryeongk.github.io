<!DOCTYPE html>
<html lang="kr" dir="ltr">
  <head>
    <meta charset="utf-8">

    <title>OliveYoung Nazarene Univ. store</title>

  </head>
  <body onload='setting();'>
    <h1>반갑습니다. 행복한 올리브영 나사렛점입니다.</h1>

    <canvas id="circle" width=650 height=375></canvas>

    <script>
      // 올리브영 초록 : #9bce26; 주황 : #f27370
      // localStorage.clear()
      var user;

      if (localStorage.getItem('user')) {
        user['visitingCount'] += 1
      }
      else {
        user = {
          visitingCount : 1
        }
        localStorage.setItem('user', JSON.stringify(user));
      }

      function setting() {
        var ctx = document.getElementById('circle').getContext('2d');

        var X = 125; var Y = 75;
        var x = 75; var y = 75;

        for (var i=0; i<10; i++) {
          ctx.beginPath();
          ctx.moveTo(X, Y);
          ctx.arc(x, y, 50, 0, Math.PI * 2, true);
          ctx.strokeStyle = 'green';
          // ctx.fill();
          if (i < user['visitingCount']) {
            ctx.fillStyle = '#f27370';
            ctx.fill();
          }
          ctx.stroke();
          X += 125
          x += 125
          if (i === 4) {
            X = 125; Y += 125;
            x = 75; y += 125;
          }
        }



      }

    </script>

  </body>
</html>

<!DOCTYPE html>
<html lang="kr" dir="ltr">
  <head>
    <meta charset="utf-8">
    <script src="smtp.js"></script>
    <title>OliveYoung Nazarene Univ. store</title>

  </head>
  <body onload='setting();'>
    <h1>반갑습니다. 행복한 올리브영 나사렛점입니다.</h1>

    <canvas id="circle" width=650 height=375></canvas>
    <input type='submit' value='쿠폰 사용하기' class='clear'>

    <div class='visitingTrace'>
      <p class='visitingTrace'></p>

    <script>
      // 올리브영 초록 : #9bce26; 주황 : #f27370
      // localStorage.clear()
      var clearCoupon = document.querySelector('.clear');
      var visitingTrace = document.querySelector('.visitingTrace');

      clearCoupon.addEventListener('click', clear);

      if (localStorage.length > 0) { //재방문인 경우
        localStorage.setItem(String(localStorage.length+1)+'번째 reVisiting', JSON.stringify(Date()));
        alert('감사합니다. 오늘 구매하신 상품이 고객님을 더 건강하게 해줄거에요!');
      }
      else {
        // 첫 방문인 경우
        alert('올리브영 천안 나사렛점 쿠폰북 방문을 환영합니다!');
      }

      localStorage.setItem('newVisiting', JSON.stringify(Date()));

      function clear() {
        localStorage.clear();
      }

      function setting() {
        i = 0;
        visitingTrace.textContent = '고객님께서 방문하신 날짜입니다.';
        // visitingTrace.write('<br/>');
        for (var n in localStorage){
          if (i < localStorage.length){
            visitingTrace.textContent += '지난 방문 : ';
            visitingTrace.textContent += localStorage[n];
            visitingTrace.textContent += '\n';
            i++;
          }
        }

        clearCoupon.disabled = true;

        var ctx = document.getElementById('circle').getContext('2d');
        // visitingTrace.textContent = localStorage;

        var X = 125; var Y = 75;
        var x = 75; var y = 75;

        for (var i=0; i<10; i++) {
          ctx.beginPath();
          ctx.moveTo(X, Y);
          ctx.arc(x, y, 50, 0, Math.PI * 2, true);
          ctx.strokeStyle = 'green';
          // ctx.fill();
          if (i < localStorage.length) {
            ctx.fillStyle = '#f27370';
            ctx.fill();
          }
          ctx.stroke();
          X += 125
          x += 125
          if (i === 4) {
            X = 125; Y += 125;
            x = 75; y += 125;
          }
        }

        if (localStorage.length >= 10) {
          clearCoupon.disabled = false;
        }

      }


    </script>

  </body>
</html>
